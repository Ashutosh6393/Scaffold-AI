# tech-stack.yaml
#
# The approved menu. Not a shopping list — a project uses the subset it needs.
#
# HOW AGENTS USE THIS FILE
#   1. Need to solve something? Look here first.
#   2. Listed and the project needs it  -> use it, no discussion.
#   3. Listed but the project doesn't need it -> don't install it. A queue in a
#      project with no background work is dead weight.
#   4. NOT listed -> STOP. Do not pick one. Ask the user, propose 2-3 options with
#      tradeoffs, and add the winner to this file in the same PR.
#
# Rule 4 is the one that matters. An agent quietly adding a dependency is how a
# stack becomes four state libraries and two date libraries.

version: 2
updated: 2026-07-18

# ---------------------------------------------------------------------------
# Principles
# ---------------------------------------------------------------------------
principles:
  buy_vs_build:
    rule: >-
      Check whether a maintained library or managed service already solves it before
      writing an implementation. Reinventing the wheel is a defect, not initiative.
    build_only_if:
      - No maintained option exists (archived, or no release in 18+ months).
      - Existing options need more glue than a focused in-house module.
      - It is core domain logic that differentiates the product.
      - Licensing, cost, or data residency rules the dependency out.
    checklist_before_adding:
      - Already in the monorepo? Check packages/* and the lockfile.
      - Does Bun, Elysia, or Next already do this?
      - Weekly downloads, last commit, open-issue ratio, bundle size, ships types?
      - Does it work under Bun, not just Node?
      - Is it in this file? If not, ask the user first.
  general:
    - Type safety end to end. No `any`, no unchecked `as`.
    - Validate at every boundary: HTTP, queue payloads, env, third-party responses.
    - Shared code goes in packages/*, never copy-pasted between apps.
    - Prefer server-side data fetching over client-side waterfalls.

# ---------------------------------------------------------------------------
# Foundation — every project uses all of this
# ---------------------------------------------------------------------------
foundation:
  required: true

  runtime:
    name: Bun
    role: runtime, package manager, test runner, script runner
    commands:
      install: bun install
      add: bun add <pkg>
      add_dev: bun add -d <pkg>
      run: bun run <script>
      test: bun test
    forbidden: [npm, yarn, pnpm, package-lock.json, yarn.lock, pnpm-lock.yaml]
    lockfile: bun.lock

  monorepo:
    tool: Turborepo
    config: turbo.json
    layout:
      apps/server: Web server.
      apps/web: Frontend.
      packages/: Shared packages.
    rules:
      - Every task (build, lint, test, typecheck) runs through `turbo run`.
      - Declare inputs/outputs per task or caching does nothing.
      - Cross-package imports use the workspace protocol, never relative ../../.

  language:
    name: TypeScript
    mode: strict

  lint_and_format:
    tool: Biome
    config: biome.json
    forbidden: [ESLint, Prettier]

  validation:
    tool: Zod
    rules:
      - Schemas are the source of truth. Derive types with z.infer, never hand-write them.
      - Shared schemas live in a package consumed by both apps.
      - Validate env at boot, request input, queue payloads, third-party responses.

  testing:
    unit: bun:test
    forbidden: [Jest, Vitest, Mocha]
    rules:
      - Tests colocated as *.test.ts next to the code under test.
      - Test names describe behaviour, not implementation.

# ---------------------------------------------------------------------------
# Server (apps/server) — include what the project needs
# ---------------------------------------------------------------------------
server:
  framework:
    name: Elysia.js
    required: true
    rules:
      - One plugin per domain; group routes with plugins.
      - Errors flow through a single onError handler with a consistent shape.
    folder_structure:
      root: apps/server/src
      tree:
        controllers/: HTTP only — parse, call service, shape response. No business logic.
        services/: Business logic and orchestration. No SQL, no req/res.
        repository/: All database access. Only layer that imports the DB client.
        middlewares/: Auth guards, rate limiting, logging, request context.
        lib/: Cross-cutting — redis client, queue setup, logger, env parsing.
        routes/: Route registration wiring controllers into the Elysia app.
      dependency_rule: >-
        routes -> controllers -> services -> repository. Never skip a layer downward
        (a controller must not touch the repository) and never call upward.

  database:
    when: The project persists anything.
    engine: PostgreSQL
    host: Neon
    orm: Prisma
    rules:
      - Schema lives in a shared package (packages/db), consumed by apps.
      - Migrations only via `prisma migrate`. Never hand-edit an applied migration.
      - Pooled connection string for the app; direct URL for migrations.
      - Repository layer owns all queries.
    note: >-
      "Prisma Postgres" and Neon are separate hosted products. Confirm which one is
      authoritative per environment before wiring connection strings.

  auth:
    when: The project has user accounts.
    tool: Better Auth
    rules:
      - Owns sessions, accounts, and providers. Do not hand-roll session or JWT logic.
      - Its adapter owns its tables. Do not write to them directly.
      - Route protection lives in middleware, not scattered per-controller checks.
    forbidden: [custom password hashing, custom session tables, ad-hoc JWT signing]

  cache_kv_pubsub:
    when: You need caching, rate limiting, pub/sub, or a queue backend.
    engine: Redis
    rules:
      - One shared client in lib/redis.ts. Do not construct clients ad hoc.
      - Namespace every key: <app>:<domain>:<id>.
      - Every cache key gets an explicit TTL.

  task_queue:
    when: The project has background or deferred work.
    tool: BullMQ
    requires: [redis]
    rules:
      - Workers are separate processes, never inline in the request path.
      - Job payloads are Zod-validated on enqueue AND on process.
      - Jobs must be idempotent. Set attempts and backoff explicitly.

# ---------------------------------------------------------------------------
# Web (apps/web)
# ---------------------------------------------------------------------------
web:
  framework:
    name: Next.js
    required: true
    router: app
    rules:
      - Server Components by default. Add "use client" only where needed.
      - Fetch on the server where possible.

  styling:
    tool: Tailwind CSS
    required: true
    rules:
      - Tokens (colors, spacing, fonts) in the Tailwind config, never hardcoded.
    forbidden: [CSS-in-JS libraries]

  components:
    when: The project has meaningful UI.
    libraries: [Aceternity UI, Magic UI]
    rules:
      - Check these before hand-building any animated or marketing component.
      - Components reused across apps move to packages/ui.

  client_state:
    when: There is client-only state that survives more than one component.
    tool: Zustand
    rules:
      - Small focused stores with selectors.
      - Server data never goes in Zustand.
    forbidden: [Redux, MobX, Recoil, Context-as-global-state]

  server_state:
    when: The frontend fetches from the server on the client side.
    tool: TanStack Query
    rules:
      - Centralize query keys in a typed factory.
      - Set explicit staleTime. No fetch-in-useEffect.
      - Server data lives here and is never mirrored into Zustand.

# ---------------------------------------------------------------------------
# Not chosen yet — ask before picking
# ---------------------------------------------------------------------------
# Common needs with no default. If a project needs one, propose options to the user
# and record the choice as an ADR, then add it here.
undecided:
  - email / transactional delivery
  - file storage and uploads
  - payments
  - observability, logging, error tracking
  - analytics
  - feature flags
  - CI/CD provider
  - hosting / deploy target
  - rate limiting strategy
  - i18n

# ---------------------------------------------------------------------------
# Escalation
# ---------------------------------------------------------------------------
decision_protocol:
  - Covered here and needed? Use it. No substitutes.
  - Covered here and not needed? Don't install it.
  - Not covered? Ask the user. Propose 2-3 options with tradeoffs. Never pick silently.
  - Never add a second tool for a job a listed tool already owns.
  - Never swap a listed tool for a "better" one without an ADR and approval.
  - A new entry here ships with an ADR in docs/adr/ explaining the choice.
